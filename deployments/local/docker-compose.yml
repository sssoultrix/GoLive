name: golive-local

services:
  redpanda:
    image: redpandadata/redpanda:v24.3.12
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      # Avoid relying on grep / output format; rely on rpk exit code.
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 2s
      timeout: 3s
      retries: 60

  redpanda-init:
    image: redpandadata/redpanda:v24.3.12
    depends_on:
      redpanda:
        condition: service_started
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        TOPIC="${KAFKA_TOPIC_USER_EVENTS:-user.events.v1}";
        for i in $(seq 1 60); do
          rpk topic create -X brokers=redpanda:9092 "$$TOPIC" -p 1 -r 1 && exit 0;
          sleep 1;
        done;
        echo "failed to create topic $$TOPIC" >&2;
        exit 1
    restart: "no"

  auth-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${AUTH_POSTGRES_DB:-auth}
      POSTGRES_USER: ${AUTH_POSTGRES_USER:-auth}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD:-auth}
    ports:
      - "${AUTH_POSTGRES_PORT_HOST:-5432}:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 30

  auth-migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      auth-postgres:
        condition: service_healthy
    volumes:
      - ../../auth/migrations:/migrations:ro
    entrypoint:
      - /migrate
      - -path
      - /migrations
      - -database
      - postgres://${AUTH_POSTGRES_USER:-auth}:${AUTH_POSTGRES_PASSWORD:-auth}@auth-postgres:5432/${AUTH_POSTGRES_DB:-auth}?sslmode=${AUTH_POSTGRES_SSLMODE:-disable}
    command: ["up"]
    restart: "no"

  auth-api:
    build:
      context: ../../auth
      dockerfile: Dockerfile
    environment:
      AUTH_HTTP_ADDR: 0.0.0.0:8080
      POSTGRES_HOST: auth-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${AUTH_POSTGRES_DB:-auth}
      POSTGRES_USER: ${AUTH_POSTGRES_USER:-auth}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD:-auth}
      POSTGRES_SSLMODE: ${AUTH_POSTGRES_SSLMODE:-disable}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_secret}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-720h}

      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_USER_EVENTS: ${KAFKA_TOPIC_USER_EVENTS:-user.events.v1}
      PROFILE_BASE_URL: ${PROFILE_BASE_URL:-}
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_started
      redpanda-init:
        condition: service_completed_successfully
    ports:
      - "${AUTH_HTTP_PORT_HOST:-8080}:8080"

  profile-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PROFILE_POSTGRES_DB:-profile}
      POSTGRES_USER: ${PROFILE_POSTGRES_USER:-profile}
      POSTGRES_PASSWORD: ${PROFILE_POSTGRES_PASSWORD:-profile}
    ports:
      - "${PROFILE_POSTGRES_PORT_HOST:-5433}:5432"
    volumes:
      - profile_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 30

  profile-migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      profile-postgres:
        condition: service_healthy
    volumes:
      - ../../profile/migrations:/migrations:ro
    entrypoint:
      - /migrate
      - -path
      - /migrations
      - -database
      - postgres://${PROFILE_POSTGRES_USER:-profile}:${PROFILE_POSTGRES_PASSWORD:-profile}@profile-postgres:5432/${PROFILE_POSTGRES_DB:-profile}?sslmode=${PROFILE_POSTGRES_SSLMODE:-disable}
    command: ["up"]
    restart: "no"

  profile-api:
    build:
      context: ../../profile
      dockerfile: Dockerfile
    environment:
      PROFILE_HTTP_ADDR: 0.0.0.0:8081
      POSTGRES_HOST: profile-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${PROFILE_POSTGRES_DB:-profile}
      POSTGRES_USER: ${PROFILE_POSTGRES_USER:-profile}
      POSTGRES_PASSWORD: ${PROFILE_POSTGRES_PASSWORD:-profile}
      POSTGRES_SSLMODE: ${PROFILE_POSTGRES_SSLMODE:-disable}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_secret}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}

      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_USER_EVENTS: ${KAFKA_TOPIC_USER_EVENTS:-user.events.v1}
      KAFKA_GROUP_PROFILE: ${KAFKA_GROUP_PROFILE:-profile-service}
    depends_on:
      profile-postgres:
        condition: service_healthy
      profile-migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_started
      redpanda-init:
        condition: service_completed_successfully
    ports:
      - "${PROFILE_HTTP_PORT_HOST:-8082}:8081"

volumes:
  auth_postgres_data:
  profile_postgres_data:

