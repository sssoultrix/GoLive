openapi: 3.0.3
info:
  title: Auth API
  description: API микросервиса аутентификации
  version: 1.0.0

servers:
  - url: /api/v1
    description: Auth service

paths:
  /auth/register:
    post:
      summary: Регистрация пользователя
      operationId: register
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Пользователь с таким login уже существует

  /auth/login:
    post:
      summary: Вход в систему
      operationId: login
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Неверный login или пароль
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/refresh:
    post:
      summary: Обновление токена
      operationId: refresh
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Токены успешно обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Невалидный или истёкший refresh token
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/logout:
    post:
      summary: Выход из системы
      operationId: logout
      tags:
        - Auth
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Успешный выход
        '401':
          description: Невалидный или отсутствующий токен

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
          description: Логин пользователя (уникальный)
          minLength: 3
          maxLength: 32
          pattern: '^[a-zA-Z0-9_\\.\\-]+$'
          example: user_123
        password:
          type: string
          format: password
          minLength: 8

    LoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
          description: Логин пользователя
        password:
          type: string
          format: password

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Refresh token для получения новой пары токенов

    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Опционально — refresh token для инвалидации на сервере

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
          description: Refresh token
        expires_in:
          type: integer
          description: Время жизни access token в секундах
        token_type:
          type: string
          example: Bearer

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              message:
                type: string

